name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  # ============================================================
  # Lint (oxlint)
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Run oxlint over the whole workspace (identical to `pnpm lint` locally).
      # The oxlint-action's changed-files mode exits 1 with "No files found to
      # lint" on config-only PRs (e.g. Dependabot bumps), so we invoke it directly.
      - name: Lint (oxlint)
        run: pnpm lint

  # ============================================================
  # Type check (API tsc + dashboard svelte-check)
  # ============================================================
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # No version input: action-setup reads the pinned pnpm from
      # package.json#packageManager (pnpm 11).
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check API (tsc)
        run: pnpm --filter api exec tsc --noEmit

      - name: Type check Dashboard (svelte-check)
        run: pnpm --filter dashboard check

  # ============================================================
  # Unit & Integration Tests (with real PostgreSQL)
  # ============================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flackyness_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d flackyness_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:test_password@localhost:5432/flackyness_test
      ADMIN_TOKEN: test-admin-token-for-ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: |
          touch .env
          pnpm db:migrate

      - name: Run API tests
        run: pnpm --filter api test

      - name: Run Dashboard tests
        run: pnpm --filter dashboard test

  # ============================================================
  # End-to-end tests (Playwright, real Postgres + built dashboard)
  # + dogfooding the suite's own report back into the API
  # ============================================================
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flackyness_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d flackyness_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:test_password@localhost:5432/flackyness_test
      ADMIN_TOKEN: test-admin-token-for-ci
      PUBLIC_API_URL: http://127.0.0.1:8080
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter dashboard exec playwright install --with-deps chromium

      - name: Run database migrations
        run: |
          touch .env
          pnpm db:migrate

      - name: Build and start the API
        run: |
          pnpm --filter api build
          node apps/api/dist/index.js &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/health > /dev/null; then
              echo "API is healthy."
              exit 0
            fi
            sleep 1
          done
          echo "API did not become healthy within 30s." >&2
          exit 1

      - name: Run E2E suite
        run: pnpm --filter dashboard test:e2e

      # Bonus, not a gate (design decision 5 in plan 026): POST the suite's
      # own report.json — real Playwright reporter output, not a hand-written
      # fixture — through the same ingest path CI uploaders use, and confirm
      # it's accepted. A fresh token is minted via rotate-token instead of
      # reusing global-setup's seed token so that the project's real ingest
      # token is never written to a file or log anywhere in this job.
      - name: Dogfood the suite's own report
        continue-on-error: true
        env:
          # `github` context values are untrusted input (branch names are
          # attacker-influenceable); pass them through env: rather than
          # interpolating `${{ }}` directly into the shell script.
          REF_NAME: ${{ github.head_ref || github.ref_name }}
          # NOT plain `github.sha`. On a `pull_request` event that is the SHA
          # of the ephemeral auto-generated merge commit (refs/pull/N/merge)
          # between the PR head and the base branch — a commit that exists
          # nowhere in the contributor's branch, is regenerated whenever the
          # base branch moves, and cannot be resolved back to a real
          # revision. On `pull_request` the left side is the real head
          # commit; on `push` it is empty and `github.sha` (correct there)
          # takes over. Matches action.yml's FLACKYNESS_COMMIT. Do not
          # "simplify".
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -uo pipefail
          PROJECT_ID=$(node -e "console.log(JSON.parse(require('fs').readFileSync('apps/dashboard/e2e/.artifacts/seed.json', 'utf-8')).projectId)")
          TOKEN_RESPONSE=$(curl -sS -X POST "http://127.0.0.1:8080/api/v1/admin/projects/${PROJECT_ID}/rotate-token" \
            -H "Authorization: Bearer ${ADMIN_TOKEN}")
          TOKEN=$(node -e "console.log(JSON.parse(process.argv[1]).token)" "$TOKEN_RESPONSE")
          ENCODED_BRANCH=$(node -e "console.log(encodeURIComponent(process.argv[1]))" "$REF_NAME")
          STATUS=$(curl -sS -o /tmp/dogfood-response.json -w '%{http_code}' \
            -X POST "http://127.0.0.1:8080/api/v1/reports?branch=${ENCODED_BRANCH}&commit=${COMMIT_SHA}&pipeline=${RUN_ID}" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @apps/dashboard/playwright-report/report.json)
          if [ "$STATUS" = "201" ]; then
            echo "Dogfood ingest succeeded (201)."
          else
            echo "Dogfood ingest failed (HTTP $STATUS) — this does not fail the job. Response body:"
            cat /tmp/dogfood-response.json
            exit 1
          fi

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/html
          retention-days: 7

  # ============================================================
  # Build
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter api build

      - name: Build Dashboard
        run: pnpm --filter dashboard build

  # ============================================================
  # Docker build verification (no push)
  # ============================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - name: Build API image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build Dashboard image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: ./apps/dashboard/Dockerfile
          push: false
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard
