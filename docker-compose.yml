# Flackyness - Full Stack Deployment
# Usage: docker compose up -d

services:
  # ==========================================================================
  # Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: flackyness-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: flackyness
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD environment variable is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flackyness"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - flackyness

  # ==========================================================================
  # API (Hono Backend)
  # ==========================================================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: flackyness-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@postgres:5432/flackyness
      API_PORT: 8080
      API_HOST: 0.0.0.0
      DASHBOARD_URL: http://localhost:3000
      ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN environment variable is required}
      READ_TOKEN: ${READ_TOKEN:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - flackyness

  # ==========================================================================
  # Dashboard (SvelteKit Frontend)
  # ==========================================================================
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: flackyness-dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PUBLIC_API_URL: http://localhost:8080
      PORT: 3000
      HOST: 0.0.0.0
      # Required for the admin console's write actions (create/patch/rotate/
      # prune/delete — plan 053) to work at all. adapter-node's CSRF check
      # compares the browser's Origin header against its own guess at the
      # request's origin; without ORIGIN (or PROTOCOL_HEADER) set, it
      # defaults to assuming https (see get_origin() in
      # @sveltejs/adapter-node/files/handler.js), so every same-origin POST
      # over plain http 403s as "cross-site". Set this to the externally
      # visible URL the dashboard is served from (with a reverse proxy in
      # front, that is the proxy's https URL, not this container's own
      # http port).
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      # Optional — gates every dashboard route behind HTTP Basic Auth
      # (apps/dashboard/src/hooks.server.ts). Unset by default here so a
      # fresh `docker compose up` doesn't lock anyone out; set it in `.env`
      # before exposing this dashboard beyond a trusted network. See
      # docs/GETTING_STARTED.md.
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
      # Presented as a Bearer credential on every SSR call to the API (see
      # apps/dashboard/src/lib/server/api.ts). Must match the API's
      # READ_TOKEN above — set both or neither. If the API's is set and this
      # one isn't, every dashboard page 500s instead of loading.
      READ_TOKEN: ${READ_TOKEN:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - flackyness

networks:
  flackyness:
    driver: bridge

volumes:
  postgres_data:
