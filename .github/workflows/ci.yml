name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default token.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Corepack activates the pnpm version pinned in package.json#packageManager.
      # Enable it before setup-node so the pnpm cache can be wired up.
      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck (API)
        run: pnpm --filter api exec tsc --noEmit

      - name: Check (dashboard)
        run: pnpm --filter dashboard check

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test
