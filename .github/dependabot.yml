# Dependabot configuration
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # JavaScript / TypeScript dependencies across the pnpm workspace.
  # The "npm" ecosystem understands pnpm workspaces; the directories glob
  # covers the root manifest plus every app and package.
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/*"
      - "/packages/*"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    # Batch low-risk updates into a few PRs instead of one-per-package.
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by any workflows under .github/workflows.
  # No-ops harmlessly until workflows are added.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
